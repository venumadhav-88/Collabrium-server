services:
  - type: web
    name: collabrium-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/collabrium-backend-1.0.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
