# =====================================================
# BASE Configuration — secrets always via env vars
# =====================================================
spring.profiles.active=dev

# Server
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/collabrium_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:kannalu}

# JWT Configuration
jwt.secret=${JWT_SECRET:collabrium-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
